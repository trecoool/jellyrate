<!DOCTYPE html>
<html>
<head>
    <title>Ratings</title>
</head>
<body>
    <div id="RatingsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="RatingsConfigForm">
                    <div class="verticalSection">
                        <h2 class="sectionTitle">Ratings Settings</h2>

                        <div class="checkboxContainer checkboxContainer-withDescription">
                            <label class="emby-checkbox-label">
                                <input id="ShowInAdminMenu" name="ShowInAdminMenu" type="checkbox" is="emby-checkbox" />
                                <span>Show in admin sidebar menu (requires restart)</span>
                            </label>
                        </div>

                        <div class="checkboxContainer checkboxContainer-withDescription">
                            <label class="emby-checkbox-label">
                                <input id="EnableRatings" name="EnableRatings" type="checkbox" is="emby-checkbox" />
                                <span>Enable Ratings</span>
                            </label>
                        </div>

                        <div class="checkboxContainer checkboxContainer-withDescription">
                            <label class="emby-checkbox-label">
                                <input id="DisableUserRatedTab" name="DisableUserRatedTab" type="checkbox" is="emby-checkbox" />
                                <span>Disable "User Rated" library tab</span>
                            </label>
                        </div>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="MinRating">Minimum Rating</label>
                            <input id="MinRating" name="MinRating" type="number" is="emby-input"
                                   min="0" max="100" step="1" />
                        </div>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="MaxRating">Maximum Rating</label>
                            <input id="MaxRating" name="MaxRating" type="number" is="emby-input"
                                   min="1" max="100" step="1" />
                        </div>

                        <div>
                            <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                                <span>Save</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            var RatingsConfig = {
                pluginUniqueId: 'f3b5e142-7a68-4d5c-9b3a-1e8f6c4d2a09'
            };

            document.querySelector('#RatingsConfigPage')
                .addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(RatingsConfig.pluginUniqueId).then(function (config) {
                        document.querySelector('#ShowInAdminMenu').checked = config.ShowInAdminMenu;
                        document.querySelector('#EnableRatings').checked = config.EnableRatings;
                        document.querySelector('#DisableUserRatedTab').checked = config.DisableUserRatedTab;
                        document.querySelector('#MinRating').value = config.MinRating;
                        document.querySelector('#MaxRating').value = config.MaxRating;
                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector('#RatingsConfigForm')
                .addEventListener('submit', function (e) {
                    e.preventDefault();
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(RatingsConfig.pluginUniqueId).then(function (config) {
                        config.ShowInAdminMenu = document.querySelector('#ShowInAdminMenu').checked;
                        config.EnableRatings = document.querySelector('#EnableRatings').checked;
                        config.DisableUserRatedTab = document.querySelector('#DisableUserRatedTab').checked;
                        config.MinRating = parseInt(document.querySelector('#MinRating').value, 10);
                        config.MaxRating = parseInt(document.querySelector('#MaxRating').value, 10);
                        ApiClient.updatePluginConfiguration(RatingsConfig.pluginUniqueId, config).then(function () {
                            Dashboard.processPluginConfigurationUpdateResult();
                        });
                    });
                    return false;
                });
        </script>
    </div>
</body>
</html>
